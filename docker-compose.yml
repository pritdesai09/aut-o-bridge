version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autbridge-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/static:/app/static
      - ./backend/autbridge.db:/app/autbridge.db
      - deepface_models:/root/.deepface
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./autbridge.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autbridge-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  deepface_models: