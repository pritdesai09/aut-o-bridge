{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto fade-in">
  <div class="glass rounded-3xl p-8 shadow-xl">
    <div class="text-center mb-8">
      <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-black text-2xl shadow-lg">A</div>
      <h1 class="text-3xl font-black text-gray-800">Create Account</h1>
      <p class="text-gray-400 mt-1 text-sm">Start your child's care journey</p>
    </div>
    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-600 rounded-2xl px-4 py-3 mb-6 text-sm font-semibold flex items-center gap-2">
      <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i> {{ error }}
    </div>
    {% endif %}
    <form method="POST" action="/auth/register" class="space-y-4">
      <div>
        <label class="text-sm font-bold text-gray-600 block mb-1 flex items-center gap-1">
          <i data-lucide="user" class="w-4 h-4"></i> Full Name
        </label>
        <input type="text" name="full_name" required placeholder="Your full name"
          class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white/80 font-semibold"/>
      </div>
      <div>
        <label class="text-sm font-bold text-gray-600 block mb-1 flex items-center gap-1">
          <i data-lucide="mail" class="w-4 h-4"></i> Email Address
        </label>
        <input type="email" name="email" required placeholder="you@email.com"
          class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white/80 font-semibold"/>
      </div>
      <div>
        <label class="text-sm font-bold text-gray-600 block mb-1 flex items-center gap-1">
          <i data-lucide="phone" class="w-4 h-4"></i> Phone Number
        </label>
        <input type="tel" name="phone" placeholder="+91 98765 43210"
          class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white/80 font-semibold"/>
      </div>
      <div>
        <label class="text-sm font-bold text-gray-600 block mb-1 flex items-center gap-1">
          <i data-lucide="lock" class="w-4 h-4"></i> Password
        </label>
        <input type="password" name="password" required placeholder="Create a strong password"
          class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white/80 font-semibold"/>
        <p class="text-xs text-gray-400 mt-1 ml-1">Minimum 8 characters</p>
      </div>
      <button type="submit" class="btn-primary w-full py-3.5 rounded-2xl font-black text-lg mt-2 flex items-center justify-center gap-2">
        <i data-lucide="user-plus" class="w-5 h-5"></i> Create Account
      </button>
    </form>
    <p class="text-center text-sm text-gray-400 mt-6">Already have an account? <a href="/auth/login" class="text-indigo-600 font-bold hover:underline">Sign in</a></p>
  </div>
</div>
{% endblock %}
