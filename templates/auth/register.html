{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto fade-in">
  <div class="glass rounded-3xl p-8 shadow-xl">
    <div class="text-center mb-8">
      <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-3xl font-black">A</div>
      <h1 class="text-3xl font-black text-gray-800">Create Account</h1>
      <p class="text-gray-400 mt-1">Start your child's care journey</p>
    </div>
    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-600 rounded-2xl px-4 py-3 mb-6 text-sm font-semibold">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/auth/register" class="space-y-4">
      <div>
        <label class="text-sm font-bold text-gray-600 block mb-1">Full Name</label>
        <input type="text" name="full_name" required placeholder="Your full name"
          class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white/80"/>
      </div>
      <div>
        <label class="text-sm font-bold text-gray-600 block mb-1">Email Address</label>
        <input type="email" name="email" required placeholder="you@email.com"
          class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white/80"/>
      </div>
      <div>
        <label class="text-sm font-bold text-gray-600 block mb-1">Phone Number</label>
        <input type="tel" name="phone" placeholder="+91 98765 43210"
          class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white/80"/>
      </div>
      <div>
        <label class="text-sm font-bold text-gray-600 block mb-1">Password</label>
        <input type="password" name="password" required placeholder="Create a strong password"
          class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white/80"/>
      </div>
      <div>
        <label class="text-sm font-bold text-gray-600 block mb-1">Preferred Language</label>
        <select name="language" class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 bg-white/80 font-semibold">
          <option value="en">🇬🇧 English</option>
          <option value="hi">🇮🇳 Hindi</option>
          <option value="mr">🟠 Marathi</option>
        </select>
      </div>
      <button type="submit" class="btn-primary w-full py-3 rounded-2xl font-black text-lg mt-2">Create Account →</button>
    </form>
    <p class="text-center text-sm text-gray-400 mt-6">Already have an account? <a href="/auth/login" class="text-indigo-600 font-bold hover:underline">Sign in</a></p>
  </div>
</div>
{% endblock %}
