{% extends "base.html" %}
{% block content %}
<div class="max-w-lg mx-auto fade-in">
  <a href="/consultation/doctors" class="flex items-center gap-2 text-gray-400 font-semibold text-sm mb-6 hover:text-indigo-600 transition-colors">
    <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Doctors
  </a>
  {% if doctor %}
  <div class="glass rounded-3xl p-8">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-200 to-purple-200 flex items-center justify-center">
        <i data-lucide="user-round" class="w-7 h-7 text-indigo-600"></i>
      </div>
      <div>
        <h2 class="font-black text-gray-800 text-lg">{{ doctor.name }}</h2>
        <p class="text-indigo-600 font-semibold text-sm">{{ doctor.specialty }}</p>
      </div>
    </div>
    <h1 class="text-2xl font-black text-gray-800 mb-6 flex items-center gap-2">
      <i data-lucide="calendar-plus" class="w-6 h-6 text-indigo-500"></i> Book Appointment
    </h1>
    <form method="POST" action="/consultation/booking/{{ doctor.id }}" class="space-y-4">
      {% if children %}
      <div>
        <label class="text-sm font-bold text-gray-600 block mb-1 flex items-center gap-1">
          <i data-lucide="baby" class="w-4 h-4"></i> Select Child
        </label>
        <select name="child_id" class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm font-semibold bg-white/80 focus:outline-none focus:ring-2 focus:ring-indigo-300">
          {% for child in children %}
          <option value="{{ child.id }}">{{ child.full_name }}</option>
          {% endfor %}
        </select>
      </div>
      {% else %}
      <input type="hidden" name="child_id" value="1"/>
      {% endif %}
      <div>
        <label class="text-sm font-bold text-gray-600 block mb-1 flex items-center gap-1">
          <i data-lucide="calendar" class="w-4 h-4"></i> Date
        </label>
        <input type="date" name="appointment_date" required
          class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm bg-white/80 focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
      </div>
      <div>
        <label class="text-sm font-bold text-gray-600 block mb-1 flex items-center gap-1">
          <i data-lucide="clock" class="w-4 h-4"></i> Time Slot
        </label>
        <select name="appointment_time" class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm font-semibold bg-white/80 focus:outline-none focus:ring-2 focus:ring-indigo-300">
          <option value="09:00 AM">09:00 AM</option>
          <option value="10:00 AM">10:00 AM</option>
          <option value="11:00 AM">11:00 AM</option>
          <option value="12:00 PM">12:00 PM</option>
          <option value="02:00 PM">02:00 PM</option>
          <option value="03:00 PM">03:00 PM</option>
          <option value="04:00 PM">04:00 PM</option>
          <option value="05:00 PM">05:00 PM</option>
        </select>
      </div>
      <div>
        <label class="text-sm font-bold text-gray-600 block mb-1 flex items-center gap-1">
          <i data-lucide="monitor-smartphone" class="w-4 h-4"></i> Mode
        </label>
        <div class="flex gap-3">
          {% for m in doctor.available_modes %}
          <label class="flex-1 cursor-pointer">
            <input type="radio" name="mode" value="{{ m }}" class="hidden peer" {% if loop.first %}checked{% endif %}/>
            <div class="peer-checked:border-indigo-500 peer-checked:bg-indigo-50 peer-checked:text-indigo-700 border-2 border-gray-200 rounded-2xl p-3 text-center text-sm font-bold text-gray-500 transition-all flex items-center justify-center gap-2">
              <i data-lucide="{% if m == 'Online' %}video{% else %}building-2{% endif %}" class="w-4 h-4"></i> {{ m }}
            </div>
          </label>
          {% endfor %}
        </div>
      </div>
      <div>
        <label class="text-sm font-bold text-gray-600 block mb-1 flex items-center gap-1">
          <i data-lucide="message-square" class="w-4 h-4"></i> Notes (optional)
        </label>
        <textarea name="notes" rows="3" placeholder="Any specific concerns or information for the doctor..."
          class="w-full border border-gray-200 rounded-2xl px-4 py-3 text-sm bg-white/80 focus:outline-none focus:ring-2 focus:ring-indigo-300 resize-none"></textarea>
      </div>
      <div class="bg-indigo-50 rounded-2xl p-3 flex justify-between items-center">
        <span class="font-bold text-gray-600 text-sm flex items-center gap-1">
          <i data-lucide="indian-rupee" class="w-4 h-4"></i> Consultation Fee
        </span>
        <span class="font-black text-indigo-600 text-lg">₹{{ doctor.fee }}</span>
      </div>
      <button type="submit" class="btn-primary w-full py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2">
        <i data-lucide="check-circle" class="w-5 h-5"></i> Confirm Booking
      </button>
    </form>
  </div>
  {% endif %}
</div>
{% endblock %}
