<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aut-o-Bridge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    *{font-family:'Nunito',sans-serif}
    .glass{background:rgba(255,255,255,0.75);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.6)}
    .gradient-bg{background:linear-gradient(135deg,#f0f9ff 0%,#fef3f2 50%,#f0fdf4 100%)}
    .btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;transition:all 0.3s ease}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(99,102,241,0.35)}
    .btn-secondary{background:linear-gradient(135deg,#f97316,#fb923c);color:white;transition:all 0.3s ease}
    .btn-secondary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(249,115,22,0.35)}
    .card-hover{transition:all 0.3s ease}
    .card-hover:hover{transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,0.1)}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .float{animation:float 3s ease-in-out infinite}
    .fade-in{animation:fadeUp 0.6s ease forwards}
  </style>
</head>
<body class="gradient-bg min-h-screen">
<nav class="glass sticky top-0 z-50 px-6 py-3 shadow-sm">
  <div class="max-w-7xl mx-auto flex items-center justify-between">
    <a href="/dashboard/home" class="flex items-center gap-2">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-black text-lg">A</div>
      <span class="font-black text-xl bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">Aut-o-Bridge</span>
    </a>
    <div class="hidden md:flex items-center gap-5">
      <a href="/dashboard/home" class="flex items-center gap-1.5 text-gray-600 hover:text-indigo-600 font-semibold text-sm transition-colors">
        <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
      </a>
      <a href="/diagnosis/questionnaire" class="flex items-center gap-1.5 text-gray-600 hover:text-indigo-600 font-semibold text-sm transition-colors">
        <i data-lucide="scan-face" class="w-4 h-4"></i> Diagnose
      </a>
      <a href="/communication/board" class="flex items-center gap-1.5 text-gray-600 hover:text-indigo-600 font-semibold text-sm transition-colors">
        <i data-lucide="layout-grid" class="w-4 h-4"></i> Communicate
      </a>
      <a href="/consultation/doctors" class="flex items-center gap-1.5 text-gray-600 hover:text-indigo-600 font-semibold text-sm transition-colors">
        <i data-lucide="stethoscope" class="w-4 h-4"></i> Consult
      </a>
    </div>
    <a href="/auth/logout" class="flex items-center gap-1.5 btn-primary px-4 py-2 rounded-xl text-sm font-bold">
      <i data-lucide="log-out" class="w-4 h-4"></i> Logout
    </a>
  </div>
</nav>
<main class="max-w-7xl mx-auto px-4 py-8">
  {% block content %}{% endblock %}
</main>
<script>
  lucide.createIcons();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
